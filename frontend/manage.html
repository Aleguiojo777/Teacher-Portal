<div class="main-content">
  <div class="container">

<!-- Edit Student Modal -->
<div id="editStudentModal" class="modal modal-hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Edit Student</h2>
      <span class="close" id="closeEditStudentModal">&times;</span>
    </div>
    <div id="editStudentMessage" class="message"></div>
    <form id="studentEditForm">
      <div class="modal-form-group">
        <label for="editStudentFirstName">First Name:</label>
        <input type="text" id="editStudentFirstName" placeholder="First Name" required>
      </div>
      <div class="modal-form-group">
        <label for="editStudentLastName">Last Name:</label>
        <input type="text" id="editStudentLastName" placeholder="Last Name" required>
      </div>
      <div class="modal-form-group">
        <label for="editStudentContactNo">Contact No:</label>
        <input type="text" id="editStudentContactNo" placeholder="Contact No." required>
      </div>
      <div class="modal-form-group">
        <label for="editSectionDropdown">Section:</label>
        <select id="editSectionDropdown" required>
          <option value="">Select Section</option>
        </select>
      </div>
      <div class="modal-form-group">
        <label for="editStudentCourse">Course:</label>
        <input type="text" id="editStudentCourse" placeholder="Course" readonly>
      </div>
      <div class="modal-form-group">
        <label for="editStudentSection">Section:</label>
        <input type="text" id="editStudentSection" placeholder="Section" readonly>
      </div>
      <div class="modal-form-group">
        <label for="editStudentSubject">Subject:</label>
        <input type="text" id="editStudentSubject" placeholder="Subject" readonly>
      </div>
      <div class="modal-form-group">
        <label for="editStudentStartTime">Start Time:</label>
        <input type="text" id="editStudentStartTime" placeholder="Start Time" readonly>
      </div>
      <div class="modal-form-group">
        <label for="editStudentEndTime">End Time:</label>
        <input type="text" id="editStudentEndTime" placeholder="End Time" readonly>
      </div>
      <div class="modal-actions">
        <button type="submit" class="modal-btn save-btn">Save Changes</button>
        <button type="button" class="modal-btn cancel-btn" id="cancelEditStudentBtn">Cancel</button>
      </div>
    </form>
  </div>
</div>

<div class="card">
  <h2>Add / Update Student</h2>

  <div class="form-layout-left-btn">
    <div class="form-grid">
      <div>
        <label for="firstName">First Name</label>
        <input id="firstName" placeholder="First Name" required>
      </div>
      <div>
        <label for="lastName">Last Name</label>
        <input id="lastName" placeholder="Last Name" required>
      </div>
      <div>
        <label for="contactNo">Contact No.</label>
        <input id="contactNo" placeholder="Contact No." required>
      </div>
      <div>
        <label for="sectionDropdown">Section</label>
        <select id="sectionDropdown" title="Section" required>
          <option value="">Select Section</option>
        </select>
      </div>
      <div>
        <label for="course">Course</label>
        <input id="course" placeholder="Course" readonly>
      </div>
      <div>
        <label for="section">Section</label>
        <input id="section" placeholder="Section" readonly>
      </div>
      <div>
        <label for="subject">Subject</label>
        <input id="subject" placeholder="Subject" readonly>
      </div>
      <div>
        <label for="startTime">Start Time</label>
        <input id="startTime" placeholder="Start Time" readonly>
      </div>
      <div>
        <label for="endTime">End Time</label>
        <input id="endTime" placeholder="End Time" readonly>
      </div>
    </div>
    <button id="studentBtn" class="side-btn-left" onclick="saveStudent()">Add Student</button>
  </div>
</div>

<div class="card">
  <h2>Student Records</h2>

  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Contact No.</th>
          <th>Course</th>
          <th>Section</th>
          <th>Start</th>
          <th>End</th>
          <th>Registered</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="studentList"></tbody>
    </table>
  </div>
</div></div>
</div>
